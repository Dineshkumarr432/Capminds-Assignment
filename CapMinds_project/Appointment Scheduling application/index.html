<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1024, initial-scale=1.0" />
  <title>Appointment Calendar</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

  
    <header>
      <div id="logo">
        <img src="assets/logocap.svg" alt="" id="logoimg">
        <h1>CAPMINDS</h1>
      </div>
      
      <button id="book">
        <img src="assets/plus.svg" alt="" id="plus">Book Appointment</button>
    </header>
    
<div class="layout">
  <aside class="sidebar" id="sidebar">
    <button class="collapse-btn" id="toggleSidebar">
      <img src="assets/arrow.svg" alt="">
    </button>

    <nav class="nav">
      <a class="nav-item active" id="nav-calendar">
        <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M19 4h-2V3a1 1 0 0 0-2 0v1H9V3a1 1 0 0 0-2 0v1H5a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3h14a3 3 0 0 0 3-3V7a3 3 0 0 0-3-3m1 15a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-7h16Zm0-9H4V7a1 1 0 0 1 1-1h2v1a1 1 0 0 0 2 0V6h6v1a1 1 0 0 0 2 0V6h2a1 1 0 0 1 1 1Z"/></svg></span>
        <span class="label">Calendar</span>
      </a>

      <a class="nav-item" id="nav-dashboard">
        <span class="icon"><svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24"><path fill="currentColor" d="M13 9V3h8v6zM3 13V3h8v10zm10 8V11h8v10zM3 21v-6h8v6zm2-10h4V5H5zm10 8h4v-6h-4zm0-12h4V5h-4zM5 19h4v-2H5zm4-2"/></svg></span>
        <span class="label">Dashboard</span>
      </a>
    </nav>
  </aside>

    <main class="main-content">
      <section class="calendar-section" id="calendarView">

  <!-- top controls -->
  <div class="calendar-controls">
    <div class="calendar-controls-right">
      <button class="icon-btn" id="prevMonth">‹</button>

      <div class="date-pill">
        <span class="calendar-icon"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path fill="currentColor" d="M19 4h-2V3a1 1 0 0 0-2 0v1H9V3a1 1 0 0 0-2 0v1H5a3 3 0 0 0-3 3v12a3 3 0 0 0 3 3h14a3 3 0 0 0 3-3V7a3 3 0 0 0-3-3m1 15a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1v-7h16Zm0-9H4V7a1 1 0 0 1 1-1h2v1a1 1 0 0 0 2 0V6h6v1a1 1 0 0 0 2 0V6h2a1 1 0 0 1 1 1Z"/></svg></span>
        <span id="currentMonthLabel">January 18, 2025</span>
      </div>

      <button class="icon-btn" id="nextMonth">›</button>

      <button class="ghost-btn" id="todayBtn">Today</button>
  
  <select id="monthSelect" class="month-select">
  <option value="0">January</option>
  <option value="1">February</option>
  <option value="2">March</option>
  <option value="3">April</option>
  <option value="4">May</option>
  <option value="5">June</option>
  <option value="6">July</option>
  <option value="7">August</option>
  <option value="8">September</option>
  <option value="9">October</option>
  <option value="10">November</option>
  <option value="11">December</option>
</select>

    </div>
    

  </div>
  

  <!-- owner -->
  <div class="calendar-owner">James Marry</div>
  <div class="calendar-weekdays">
  <div>SUNDAY</div>
  <div>MONDAY</div>
  <div>TUESDAY</div>
  <div>WEDNESDAY</div>
  <div>THURSDAY</div>
  <div>FRIDAY</div>
  <div>SATURDAY</div>
</div>
<div class="calendar-grid" id="calendarGrid"></div>


</section>

<section id="dashboardView" hidden>
  <div class="dashboard-container">
   <div class="dashboard-header">
  <h2>Practice Dashboard</h2>
</div>
<div class="dashboard-filters">
 <div class="input-with-icon">
  <img src="assets/search.svg" alt="" class="input-icon" />
  <input
    type="text"
    placeholder="Patient Search"
    class="search-input"
  id="patientSearch" />
</div>

  <div class="input-with-icon">
  <img src="assets/search.svg" alt="" class="input-icon" />
  <input
    type="text"
    placeholder="Doctor Search"
    class="search-input"
    id="doctorSearch" />
</div>
  <input type="date"  id="fromDate"/>
  <span class="date-separator">–</span>
  <input type="date" id="toDate" />
  <button class="primary-btn" id="update-btn">Update</button>
</div>


<div class="dashboard-table">
  <div class="table-title">Appointment Details</div>

  <table>
    <thead>
      <tr>
        <th>Patient</th>
        <th>Doctor</th>
        <th>Hospital</th>
        <th>Speciality</th>
        <th>Select Date</th>
        <th>Select Time</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody id="dashboardTableBody"></tbody>
  </table>
</div>

  </div>
</section>

  </main>

</div>
<!-- Modal Backdrop -->
<div id="modal-backdrop" class="modal-backdrop hidden"></div>

<!-- Modal -->
<div id="appointment-modal" class="modal hidden">
  <div class="modal-header">
    <h3>Schedule Appointment</h3>
    <button id="close-modal" class="modal-close">✕</button>
  </div>

  <div class="modal-body">
    <form action="" class="form" id="appointment-form">
      <div class="form-container">

        <div class="form-subcontainer">
                  <label for=""><img src="assets/users.svg" alt=""></label>
                  <input type="text" placeholder="Patient Name" class="input"  id="patient-name" required>
        </div>
        <div class="form-subcontainer">
                  <label for=""><img src="assets/Location pin.svg" alt=""></label>
                  <input type="text" placeholder="Hospital Name" class="input" id="hospital-name">
        </div>
        <div class="form-subcontainer">
                  <label for=""><img src="assets/frame.svg" alt=""></label>
                  <input type="date" placeholder="Select Date" class="input" id="appointment-date">
              
                </div>
      </div>
      <div class="form-container">
         <div class="form-subcontainer">
                  <label for=""><img src="assets/users.svg" alt=""></label>
                  <input type="text" placeholder="Doctor Name" class="input" id="doctor-name">
        </div>
        <div class="form-subcontainer">
                  <label for=""><img src="assets/doctor.svg" alt=""></label>
                  <input type="text" placeholder="speciality" class="input" id="speciality">
        </div>
        <div class="form-subcontainer">
                  <label for=""><img src="assets/time.svg" alt=""></label>
                  <input type="time" placeholder="Select Time" class="input" id="appointment-time">
        </div>

      </div>
        
    </form>
    <div class="reason">
      <label for="">Reason</label>
      <input type="text" class="reasonInput" id="reason">
    </div>
  </div>

  <div class="modal-footer">
    <button class="btn-outline" id="cancel-modal">Cancel</button>
    <button class="btn-primary" id="save-modal">Save</button>
  </div>
</div>


  <script src="script.js"></script>
</body>
</html>
